<nav class="navbar navbar-expand-lg navbar-dark golf-navbar">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand" routerLink="/">⛳ GolfTracker</a>

    <!-- Mobile toggle -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#golfNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="golfNavbar">

      <!-- LEFT SIDE -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link"
             routerLink="/"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/courses">Courses</a>
        </li>

        <ng-container *ngIf="user">
          <li class="nav-item">
            <a class="nav-link" routerLink="/book">Book</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/rounds/new">Record Round</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/rounds">My Rounds</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/leaderboard">Leaderboards</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/profile">Profile</a>
          </li>

          <li class="nav-item" *ngIf="auth.isAdmin()">
            <a class="nav-link" routerLink="/admin">Admin Panel</a>
          </li>
        </ng-container>

      </ul>

      <!-- RIGHT SIDE -->
      <div class="d-flex align-items-center gap-3">

        <!-- Logged-out -->
        <ng-container *ngIf="!user">
          <a routerLink="/login" class="auth-btn">Login</a>
          <a routerLink="/register" class="auth-btn">Register</a>
        </ng-container>

        <!-- Logged-in -->
        <ng-container *ngIf="user">

          <div class="handicap-display">
            <span class="handicap-label">Handicap</span>
            <span class="handicap-score">
              {{ user.current_handicap ?? '—' }}
            </span>
          </div>

          <button class="btn btn-outline-light btn-sm" (click)="logout()">
            Logout
          </button>

        </ng-container>

      </div>

    </div>
  </div>
</nav>
