<div class="container mt-4">
  <h2 class="mb-4">Admin Panel – Add New Course</h2>

  <div *ngIf="message" class="alert alert-info">
    {{ message }}
  </div>

  <form (ngSubmit)="addCourse()" class="row g-3">

    <!-- Course Name -->
    <div class="col-md-6">
      <label class="form-label">Course Name *</label>
      <input type="text"
             class="form-control"
             [(ngModel)]="course.name"
             name="name"
             required>
    </div>

    <!-- Location -->
    <div class="col-md-6">
      <label class="form-label">Location</label>
      <input type="text"
             class="form-control"
             [(ngModel)]="course.location"
             name="location">
    </div>

    <!-- Par -->
    <div class="col-md-4">
      <label class="form-label">Par *</label>
      <input type="number"
             class="form-control"
             [(ngModel)]="course.par"
             name="par"
             required>
    </div>

    <!-- Course Rating -->
    <div class="col-md-4">
      <label class="form-label">Course Rating *</label>
      <input type="number"
             step="0.1"
             class="form-control"
             [(ngModel)]="course.course_rating"
             name="course_rating"
             required>
    </div>

    <!-- Slope Rating -->
    <div class="col-md-4">
      <label class="form-label">Slope Rating *</label>
      <input type="number"
             class="form-control"
             [(ngModel)]="course.slope_rating"
             name="slope_rating"
             required>
    </div>

    <!-- Multiple Image URLs -->
    <div class="col-12">
      <label class="form-label">Image URLs</label>

      <div *ngFor="let img of course.images; let i = index"
           class="d-flex gap-2 mb-2">

        <input type="text"
               class="form-control"
               [(ngModel)]="course.images[i]"
               name="image{{i}}"
               placeholder="https://example.com/image.jpg">

        <button type="button"
                class="btn btn-danger btn-sm"
                (click)="removeImage(i)"
                *ngIf="course.images.length > 1">
          Remove
        </button>
      </div>

      <button type="button"
              class="btn btn-outline-primary btn-sm"
              (click)="addImage()">
        Add Another Image
      </button>
    </div>

    <!-- Latitude -->
    <div class="col-md-6">
      <label class="form-label">Latitude</label>
      <input type="number"
             step="0.000001"
             class="form-control"
             [(ngModel)]="course.latitude"
             name="latitude">
    </div>

    <!-- Longitude -->
    <div class="col-md-6">
      <label class="form-label">Longitude</label>
      <input type="number"
             step="0.000001"
             class="form-control"
             [(ngModel)]="course.longitude"
             name="longitude">
    </div>

    <!-- Description -->
    <div class="col-12">
      <label class="form-label">Description</label>
      <textarea class="form-control"
                rows="3"
                [(ngModel)]="course.description"
                name="description">
      </textarea>
    </div>

    <!-- Submit -->
    <div class="col-12">
      <button type="submit" class="btn btn-success">
        Add Course
      </button>
    </div>

  </form>
</div>
